name: Auto Tag On Version Bump

on:
  push:
    branches: [main]
    paths:
      - "crates/tui/Cargo.toml"
      - "crates/tui/Cargo.lock"
      - ".github/workflows/auto-tag.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read current version
        id: versions
        shell: bash
        run: |
          new_version=$(python -c "import tomllib; print(tomllib.load(open('crates/tui/Cargo.toml','rb'))['package']['version'])")

          echo "new=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        id: tag
        shell: bash
        run: |
          new_version="${{ steps.versions.outputs.new }}"
          tag="v${new_version}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${tag}" "${{ github.sha }}"
          git push origin "${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yml --ref "${{ steps.tag.outputs.tag }}"
