name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v1.2.3)"
        required: false
        type: string
      source_ref:
        description: "Git ref/sha to build and release"
        required: false
        type: string

permissions:
  contents: write

env:
  BINARY_NAME: stassh
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  resolve_tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}

    steps:
      - name: Check out repository metadata
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            source_ref="${GITHUB_SHA}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
            source_ref="${{ github.event.inputs.source_ref }}"

            if [[ -z "${tag}" ]]; then
              tag="$(git tag --list 'v*' --sort=-v:refname | awk 'NR==1 { print; exit }')"
            fi

            if [[ -z "${source_ref}" ]]; then
              source_ref="$(git rev-parse origin/main)"
            fi
          else
            echo "Unsupported event context for release resolution"
            exit 1
          fi

          if [[ -z "${tag}" ]]; then
            echo "No release tag found matching pattern v*"
            exit 1
          fi

          if [[ "${tag}" != v* ]]; then
            echo "Release tag must start with 'v', got: ${tag}"
            exit 1
          fi

          echo "Using release tag: ${tag}"
          echo "Using source ref: ${source_ref}"
          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "source_ref=${source_ref}" >> "${GITHUB_OUTPUT}"

      - name: Check out repository at source ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.source_ref }}

      - name: Verify tag version matches Cargo.toml
        shell: bash
        run: |
          tag="${{ steps.resolve.outputs.release_tag }}"
          tag_version="${tag#v}"
          cargo_version=$(python - <<'PY'
          import tomllib

          with open('crates/tui/Cargo.toml', 'rb') as f:
              version = tomllib.load(f)['package']['version']
          print(version)
          PY
          )

          echo "Tag version:   ${tag_version}"
          echo "Cargo version: ${cargo_version}"

          if [[ "${tag_version}" != "${cargo_version}" ]]; then
            echo "Release tag (${tag}) does not match crates/tui/Cargo.toml version (${cargo_version})"
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: resolve_tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_tag.outputs.source_ref }}

      - name: Install Linux cross compiler
        if: matrix.packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-targets: true

      - name: Pre-fetch Cargo dependencies
        run: cargo fetch --locked

      - name: Validate telemetry secret
        env:
          STASSH_TELEMETRY_SECRET: ${{ secrets.STASSH_TELEMETRY_SECRET }}
        run: |
          if [ -z "$STASSH_TELEMETRY_SECRET" ]; then
            echo "Missing required secret: STASSH_TELEMETRY_SECRET"
            exit 1
          fi

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          STASSH_TELEMETRY_SECRET: ${{ secrets.STASSH_TELEMETRY_SECRET }}
          STASSH_BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --locked --release -p stassh --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          version="${{ needs.resolve_tag.outputs.release_tag }}"
          archive_name="${BINARY_NAME}-${version}-${{ matrix.target }}.tar.gz"
          staging_dir="release/${{ matrix.target }}"

          mkdir -p "$staging_dir"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$staging_dir/${BINARY_NAME}"
          cp README.md LICENSE.md "$staging_dir/"

          tar -czf "$archive_name" -C "$staging_dir" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ needs.resolve_tag.outputs.release_tag }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [resolve_tag, build]

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cp SHA256SUMS stassh-checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_tag.outputs.release_tag }}
          target_commitish: ${{ needs.resolve_tag.outputs.source_ref }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/stassh-checksums.txt
