name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: stassh

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux cross compiler
        if: matrix.packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Validate telemetry secret
        env:
          STASSH_TELEMETRY_SECRET: ${{ secrets.STASSH_TELEMETRY_SECRET }}
        run: |
          if [ -z "$STASSH_TELEMETRY_SECRET" ]; then
            echo "Missing required secret: STASSH_TELEMETRY_SECRET"
            exit 1
          fi

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          STASSH_TELEMETRY_SECRET: ${{ secrets.STASSH_TELEMETRY_SECRET }}
        run: cargo build --locked --release -p stassh --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive_name="${BINARY_NAME}-${version}-${{ matrix.target }}.tar.gz"
          staging_dir="release/${{ matrix.target }}"

          mkdir -p "$staging_dir"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$staging_dir/${BINARY_NAME}"
          cp README.md LICENSE.md "$staging_dir/"

          tar -czf "$archive_name" -C "$staging_dir" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
